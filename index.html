<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f2f2f2;
}

.container{
    width:800px;
    height:450px;
    background:white;
    display:flex;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* Left Side Image */
.left{
    width:50%;
}

.left img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Right Side Form */
.right{
    width:50%;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

label{
    font-weight:bold;
    margin-top:10px;
}

.required{
    color:red;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

.remember{
    margin-bottom:20px;
}

button{
    width:100%;
    padding:12px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800" alt="Student Image">
    </div>

    <div class="right">
        <h2>Student Login</h2>

        <form>
            <label>Email <span class="required">*</span></label>
            <input type="email" placeholder="Enter your email" required>

            <label>Password <span class="required">*</span></label>
            <input type="password" placeholder="Enter your password" required>

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
            </div>

            <button type="submit">Login</button>
        </form>
    </div>

</div>

</body>
</html>
