<!DOCTYPE html>
<html>
   <head>
    <title>student registration form</title>
   </head>
<body bgcolor="purple">
    <h1 align="center">student registration form</h1>
    <form>
        <table align="center"
        cellpadding="8">
        <tr>
            <td>student name:</td>
            <td><input type="text"name="sname"></td>
        </tr>
        <td>father name:</td>
        <td><input type="text"name="fname"></td>
    </tr>
    <tr>
        <td>mother name:</td>
        <td>input type="text"name="mname"</td>
    </tr>
    <tr>
        <td>Email id:</td>
        <td><input type="email"name="email name"></td>
    </tr>
    <tr>
        <td>phone number:</td>
        <td><input type="tel"name="phone"></td>
    </tr>
    <tr>
        <td>Gender:</td>
        <td>input type="radio"name="Gender">female</td>
    </tr>
    <tr>
        <td>Date of birth:</td>
        <td><input type="date"name="dob"></td>
    </tr>
    <tr>
        <td>course:</td>
        <td>
            <select>
                <option>BCA</option>
                <option>B.sc CS</option>
                <option>b.COM</option>
            </select>
        </td>
        <tr>
            <td>address:</td>
            <td><textarea rows="4" cols="20"></td>
        </tr>
    </table>
    </form>
</body>
